name: Midday Refresh

on:
  schedule:
    - cron: '30 12 * * *'  # 12:30 UTC daily
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Run learning script
        run: python learn.py
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/knowledge.json
          git commit -m "Midday knowledge refresh" || echo "No changes to commit"
          git push
