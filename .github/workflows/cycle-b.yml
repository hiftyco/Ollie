name: OLLIE_CYCLE_B
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  learn:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          token: \${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Ollie learning cycle
        run: python learn.py
      - name: Commit knowledge update
        run: |
          git config user.name "Ollie Autonomous"
          git config user.email "ollie@autonomous.bitcoin"
          git add data/knowledge.json data/reports/ || true
          git diff --staged --quiet || git commit -m "Ollie v6.1 cycle $(date -u "+%Y-%m-%d %H:%M UTC") [auto]"
          git push
        env:
          GITHUB_TOKEN: \${{ secrets.GITHUB_TOKEN }}
