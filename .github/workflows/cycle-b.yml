name: Cycle B — 06:30 UTC

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  learn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Ollie learning engine
        run: python learn.py

      - name: Commit and push knowledge
        run: |
          git config --local user.email "ollie-ai@bitcoin.intelligence"
          git config --local user.name "Ollie AI"
          git add data/knowledge.json
          git diff --staged --quiet || git commit -m "🤖 Ollie Cycle B — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
