name: OLLIE_CYCLE_A
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  learn:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Ollie learning cycle
        run: python learn.py

      - name: Commit and push knowledge update
        run: |
          git config user.name "Ollie Autonomous"
          git config user.email "ollie@autonomous.bitcoin"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/hiftyco/Ollie.git
          git add data/ || true
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git pull --rebase origin main || true
          git commit -m "Ollie v7.0 cycle $(date -u '+%Y-%m-%d %H:%M UTC') [auto]"
          git push origin main
